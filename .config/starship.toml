"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
[¯é░](fg:black bg:yellow)\
$directory\
[¯é░](fg:yellow bg:black)\
[¯é░](fg:black bg:mauve)\
$git_branch\
[¯é░](fg:mauve bg:black)\
$git_status\
[¯é░](fg:black bg:lavender)\
$time\
[¯é┤ ](fg:lavender)\
$cmd_duration\
$line_break\
$character"""

palette = 'catppuccin_mocha'

[os]
disabled = false
format = "[$symbol](fg:red)($style) "

[os.symbols]
Windows = "¯£Å"
Ubuntu = "¾░òê"
SUSE = "´îö"
Raspbian = "¾░É┐"
