Gentoo = "¾░ú¿"
Fedora = "¾░úø"
Alpine = "´îÇ"
Amazon = "´ë░"
Android = "¯£Ä"
Arch = "¾░úç"
Artix = "¾░úç"
CentOS = "´îä"
Debian = "¾░úÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'

[directory]
format = "[ $path ](fg:crust bg:yellow)($style)"
#truncate_to_repo = false
truncation_length = 0

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "

[git_branch]
symbol = "´Éİ"
format = '[[ $symbol $branch ](fg:crust bg:mauve)]($style)'

[git_status]
format = '([$all_status](fg:red)($style))'
staged = " S "
untracked = " U "
modified = " M "
conflicted = " C "
ahead = " A> "
behind = " <B "
diverged = " Div "
stashed	= " s! "
renamed	= " R " 
deleted = " D "

[git_state]
style = "black bg:yellow"  # shown during rebase, merge, etc.

[time]
disabled = false
time_format = "%T"
format = '[[ ´É║ $time ](fg:crust bg:lavender)]($style)'

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[ÔØ»](bold fg:green)'
error_symbol = '[ÔØ»](bold fg:red)'
vimcmd_symbol = '[ÔØ«](bold fg:green)'
vimcmd_replace_one_symbol = '[ÔØ«](bold fg:lavender)'
vimcmd_replace_symbol = '[ÔØ«](bold fg:lavender)'
vimcmd_visual_symbol = '[ÔØ«](bold fg:yellow)'

[cmd_duration]
show_milliseconds = true
format = "¯½┤ in $duration "
style = "bg:lavender"
disabled = false
show_notifications = true
min_time_to_notify = 45000

